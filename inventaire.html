<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Stock — Inventaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F2E9;
    --paper-2:#EFE9DA;
    --ink:#221F1A;
    --navy:#223247;
    --navy-2:#182533;
    --mustard:#D9A441;
    --mustard-dark:#8A6318;
    --sage:#6C7A57;
    --sage-dark:#3E4630;
    --rust:#B5533C;
    --rust-dark:#7A3323;
    --line: rgba(34,31,26,0.16);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
    padding-bottom:100px;
  }
  h1,h2,h3,.display{
    font-family:'Oswald', sans-serif;
    text-transform:uppercase;
    letter-spacing:0.04em;
    margin:0;
  }
  .mono{ font-family:'IBM Plex Mono', monospace; }

  header{
    position:sticky; top:0; z-index:20;
    background:var(--navy);
    color:var(--paper);
    padding:18px 16px 14px;
    border-bottom:3px solid var(--mustard);
  }
  header .top-row{
    display:flex; align-items:baseline; justify-content:space-between;
  }
  header h1{ font-size:22px; color:var(--paper); }
  header .count{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px; color:var(--mustard);
  }
  .search-row{
    display:flex; gap:8px; margin-top:12px;
  }
  .search-row input{
    flex:1;
    background:rgba(246,242,233,0.1);
    border:1px solid rgba(246,242,233,0.35);
    color:var(--paper);
    border-radius:6px;
    padding:9px 12px;
    font-size:14px;
    font-family:'IBM Plex Sans', sans-serif;
  }
  .search-row input::placeholder{ color:rgba(246,242,233,0.55); }

  .chips{
    display:flex; gap:6px; overflow-x:auto; margin-top:10px; padding-bottom:2px;
    scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{
    flex:none;
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:0.03em;
    padding:6px 11px;
    border-radius:20px;
    border:1px solid rgba(246,242,233,0.35);
    color:rgba(246,242,233,0.8);
    background:transparent;
    white-space:nowrap;
  }
  .chip.active{
    background:var(--mustard);
    border-color:var(--mustard);
    color:var(--navy-2);
    font-weight:600;
  }

  main{ padding:16px; }

  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--ink);
    opacity:0.6;
  }
  .empty i{ font-size:34px; display:block; margin-bottom:10px; }

  .card{
    position:relative;
    display:flex;
    gap:12px;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:4px;
    padding:12px 14px 12px 22px;
    margin-bottom:10px;
  }
  .card::before{
    content:"";
    position:absolute;
    left:9px; top:50%;
    transform:translateY(-50%);
    width:9px; height:9px;
    border-radius:50%;
    background:var(--paper);
    border:1.5px solid var(--line);
  }
  .card::after{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width:1px;
    background-image: linear-gradient(var(--line) 60%, transparent 0%);
    background-size: 1px 6px;
    background-repeat: repeat-y;
  }
  .thumb{
    width:56px; height:56px;
    border-radius:4px;
    background:var(--paper) center/cover no-repeat;
    border:1px solid var(--line);
    flex:none;
    display:flex; align-items:center; justify-content:center;
    color:var(--ink); opacity:0.35;
    font-size:20px;
  }
  .card-body{ flex:1; min-width:0; }
  .card-name{
    font-weight:500; font-size:15px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .card-loc{
    display:inline-block;
    margin-top:5px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.03em;
    background:var(--sage);
    color:#EEF1E7;
    padding:2px 7px;
    border-radius:3px;
  }
  .card-actions{
    display:flex; align-items:center; gap:8px; flex:none;
  }
  .stepper{
    display:flex; align-items:center; gap:8px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:20px;
    padding:3px;
  }
  .stepper button{
    width:24px; height:24px;
    border-radius:50%;
    border:none;
    background:var(--navy);
    color:var(--paper);
    font-size:15px;
    line-height:1;
    display:flex; align-items:center; justify-content:center;
  }
  .stepper button:active{ transform:scale(0.92); }
  .stepper .qty{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:14px;
    min-width:20px;
    text-align:center;
  }
  .icon-btn{
    background:none; border:none; color:var(--ink); opacity:0.45;
    font-size:16px; padding:4px;
  }

  .fab-bar{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    display:flex; justify-content:center;
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent, var(--paper) 40%);
  }
  .fab{
    display:flex; align-items:center; gap:8px;
    background:var(--mustard);
    color:var(--navy-2);
    border:none;
    font-family:'Oswald', sans-serif;
    text-transform:uppercase;
    letter-spacing:0.04em;
    font-size:15px;
    font-weight:600;
    padding:13px 26px;
    border-radius:30px;
    box-shadow:0 3px 0 var(--mustard-dark);
  }
  .fab:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--mustard-dark); }

  .sheet-overlay{
    display:none;
    position:fixed; inset:0; z-index:50;
    background:rgba(34,31,26,0.5);
  }
  .sheet-overlay.open{ display:block; }
  .sheet{
    position:absolute; left:0; right:0; bottom:0;
    background:var(--paper);
    border-radius:16px 16px 0 0;
    padding:18px 18px calc(18px + env(safe-area-inset-bottom));
    max-height:88vh;
    overflow-y:auto;
    border-top:3px solid var(--mustard);
  }
  .sheet h2{ font-size:19px; margin-bottom:14px; }
  .field{ margin-bottom:14px; }
  .field label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--navy);
    margin-bottom:5px;
  }
  .field input[type=text], .field select{
    width:100%;
    padding:11px 12px;
    border-radius:6px;
    border:1px solid var(--line);
    background:#fff;
    font-size:15px;
    font-family:'IBM Plex Sans', sans-serif;
    color:var(--ink);
  }
  .photo-picker{
    display:flex; align-items:center; gap:12px;
  }
  .photo-preview{
    width:72px; height:72px;
    border-radius:6px;
    border:1.5px dashed var(--line);
    background:#fff center/cover no-repeat;
    display:flex; align-items:center; justify-content:center;
    color:var(--ink); opacity:0.4;
    font-size:22px;
    flex:none;
  }
  .photo-btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    text-transform:uppercase;
    padding:9px 14px;
    border-radius:6px;
    border:1px solid var(--navy);
    background:transparent;
    color:var(--navy);
  }
  .qty-field{
    display:flex; align-items:center; gap:14px;
  }
  .qty-field .stepper{ padding:5px 6px; }
  .qty-field .stepper button{ width:30px; height:30px; font-size:18px; }
  .qty-field .qty{ font-size:18px; min-width:34px; }

  .loc-add-row{
    display:flex; gap:8px; margin-top:6px;
  }
  .loc-add-row input{ flex:1; }
  .loc-add-row button{
    flex:none;
    padding:0 14px;
    border-radius:6px;
    border:1px solid var(--sage);
    background:var(--sage);
    color:#fff;
  }

  .sheet-actions{
    display:flex; gap:10px; margin-top:18px;
  }
  .btn-primary, .btn-secondary{
    flex:1;
    padding:13px;
    border-radius:8px;
    font-family:'Oswald', sans-serif;
    text-transform:uppercase;
    letter-spacing:0.03em;
    font-size:14px;
    font-weight:600;
    border:none;
  }
  .btn-primary{ background:var(--navy); color:var(--paper); }
  .btn-secondary{ background:transparent; color:var(--rust); border:1px solid var(--rust); }
</style>
</head>
<body>

<header>
  <div class="top-row">
    <h1>Stock</h1>
    <span class="count mono" id="itemCount">0 article</span>
  </div>
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Rechercher un article…">
  </div>
  <div class="chips" id="locationChips"></div>
</header>

<main>
  <div id="emptyState" class="empty" style="display:none;">
    <i>&#9678;</i>
    Aucun article pour l'instant.<br>Ajoutez le premier avec le bouton ci-dessous.
  </div>
  <div id="list"></div>
</main>

<div class="fab-bar">
  <button class="fab" id="addBtn">+ Ajouter un article</button>
</div>

<div class="sheet-overlay" id="sheetOverlay">
  <div class="sheet">
    <h2 id="sheetTitle">Nouvel article</h2>

    <div class="field">
      <label>Photo</label>
      <div class="photo-picker">
        <div class="photo-preview" id="photoPreview">&#128247;</div>
        <input type="file" accept="image/*" capture="environment" id="photoInput" style="display:none;">
        <button class="photo-btn" id="photoBtn">Prendre / choisir une photo</button>
      </div>
    </div>

    <div class="field">
      <label>Nom du produit</label>
      <input type="text" id="nameInput" placeholder="Ex. Vis à bois 4x40">
    </div>

    <div class="field">
      <label>Quantité</label>
      <div class="qty-field">
        <div class="stepper">
          <button id="qtyMinus">–</button>
          <span class="qty mono" id="qtyDisplay">1</span>
          <button id="qtyPlus">+</button>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Emplacement</label>
      <select id="locationSelect"></select>
      <div class="loc-add-row">
        <input type="text" id="newLocInput" placeholder="Nouvel emplacement…">
        <button id="addLocBtn">Ajouter</button>
      </div>
    </div>

    <div class="sheet-actions">
      <button class="btn-secondary" id="deleteBtn" style="display:none;">Supprimer</button>
      <button class="btn-primary" id="saveBtn">Enregistrer</button>
    </div>
  </div>
</div>

<script>
  // Données en mémoire pour ce prototype.
  // Dans la version développée avec Claude Code, ces données seront
  // stockées durablement (fichier local / Core Data / SQLite selon la techno choisie).
  let items = [
    {id:1, name:"Vis à bois 4x40", qty:120, location:"Atelier - Tiroir 2", photo:null},
    {id:2, name:"Ampoules LED E27", qty:6, location:"Cave - Étagère A", photo:null},
    {id:3, name:"Filtre à café", qty:2, location:"Cuisine - Placard haut", photo:null},
  ];
  let locations = ["Atelier - Tiroir 2", "Cave - Étagère A", "Cuisine - Placard haut", "Garage"];

  let activeFilter = null;
  let searchTerm = "";
  let editingId = null;
  let pendingPhoto = null;
  let pendingQty = 1;

  const list = document.getElementById('list');
  const emptyState = document.getElementById('emptyState');
  const itemCount = document.getElementById('itemCount');
  const locationChips = document.getElementById('locationChips');
  const sheetOverlay = document.getElementById('sheetOverlay');
  const sheetTitle = document.getElementById('sheetTitle');
  const nameInput = document.getElementById('nameInput');
  const qtyDisplay = document.getElementById('qtyDisplay');
  const locationSelect = document.getElementById('locationSelect');
  const photoInput = document.getElementById('photoInput');
  const photoPreview = document.getElementById('photoPreview');
  const deleteBtn = document.getElementById('deleteBtn');

  function nextId(){
    return items.length ? Math.max(...items.map(i=>i.id)) + 1 : 1;
  }

  function renderChips(){
    let html = `<button class="chip ${activeFilter===null?'active':''}" data-loc="">Tous</button>`;
    locations.forEach(loc=>{
      html += `<button class="chip ${activeFilter===loc?'active':''}" data-loc="${escapeHtml(loc)}">${escapeHtml(loc)}</button>`;
    });
    locationChips.innerHTML = html;
    locationChips.querySelectorAll('.chip').forEach(chip=>{
      chip.addEventListener('click', ()=>{
        activeFilter = chip.dataset.loc || null;
        renderChips();
        renderList();
      });
    });
  }

  function renderLocationSelect(){
    locationSelect.innerHTML = locations.map(loc=>
      `<option value="${escapeHtml(loc)}">${escapeHtml(loc)}</option>`
    ).join('');
  }

  function renderList(){
    let filtered = items.filter(it=>{
      const matchLoc = !activeFilter || it.location === activeFilter;
      const matchSearch = !searchTerm || it.name.toLowerCase().includes(searchTerm.toLowerCase());
      return matchLoc && matchSearch;
    });

    itemCount.textContent = items.length + (items.length>1 ? " articles" : " article");

    if(filtered.length === 0){
      list.innerHTML = "";
      emptyState.style.display = "block";
      emptyState.innerHTML = items.length===0
        ? "&#9678;<br>Aucun article pour l'instant.<br>Ajoutez le premier avec le bouton ci-dessous."
        : "&#9678;<br>Aucun résultat pour ce filtre.";
      return;
    }
    emptyState.style.display = "none";

    list.innerHTML = filtered.map(it=>`
      <div class="card" data-id="${it.id}">
        <div class="thumb" style="${it.photo ? `background-image:url(${it.photo})` : ''}">${it.photo ? '' : '&#128247;'}</div>
        <div class="card-body" data-action="edit">
          <div class="card-name">${escapeHtml(it.name)}</div>
          <span class="card-loc">${escapeHtml(it.location)}</span>
        </div>
        <div class="card-actions">
          <div class="stepper">
            <button data-action="dec">–</button>
            <span class="qty mono">${it.qty}</span>
            <button data-action="inc">+</button>
          </div>
        </div>
      </div>
    `).join('');

    list.querySelectorAll('.card').forEach(card=>{
      const id = parseInt(card.dataset.id);
      card.querySelector('[data-action="edit"]').addEventListener('click', ()=>openSheet(id));
      card.querySelector('[data-action="inc"]').addEventListener('click', (e)=>{
        e.stopPropagation();
        changeQty(id, 1);
      });
      card.querySelector('[data-action="dec"]').addEventListener('click', (e)=>{
        e.stopPropagation();
        changeQty(id, -1);
      });
    });
  }

  function changeQty(id, delta){
    const it = items.find(i=>i.id===id);
    if(!it) return;
    it.qty = Math.max(0, it.qty + delta);
    renderList();
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function openSheet(id){
    editingId = id || null;
    const it = id ? items.find(i=>i.id===id) : null;

    sheetTitle.textContent = it ? "Modifier l'article" : "Nouvel article";
    nameInput.value = it ? it.name : "";
    pendingQty = it ? it.qty : 1;
    qtyDisplay.textContent = pendingQty;
    pendingPhoto = it ? it.photo : null;
    photoPreview.style.backgroundImage = pendingPhoto ? `url(${pendingPhoto})` : '';
    photoPreview.innerHTML = pendingPhoto ? '' : '&#128247;';
    deleteBtn.style.display = it ? 'block' : 'none';

    renderLocationSelect();
    if(it) locationSelect.value = it.location;

    sheetOverlay.classList.add('open');
  }

  function closeSheet(){
    sheetOverlay.classList.remove('open');
    editingId = null;
  }

  document.getElementById('addBtn').addEventListener('click', ()=>openSheet(null));
  sheetOverlay.addEventListener('click', (e)=>{ if(e.target === sheetOverlay) closeSheet(); });

  document.getElementById('qtyMinus').addEventListener('click', ()=>{
    pendingQty = Math.max(0, pendingQty - 1);
    qtyDisplay.textContent = pendingQty;
  });
  document.getElementById('qtyPlus').addEventListener('click', ()=>{
    pendingQty += 1;
    qtyDisplay.textContent = pendingQty;
  });

  document.getElementById('photoBtn').addEventListener('click', ()=> photoInput.click());
  photoInput.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxSize = 400;
        let w = img.width, h = img.height;
        if(w > h && w > maxSize){ h *= maxSize/w; w = maxSize; }
        else if(h > maxSize){ w *= maxSize/h; h = maxSize; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        pendingPhoto = canvas.toDataURL('image/jpeg', 0.7);
        photoPreview.style.backgroundImage = `url(${pendingPhoto})`;
        photoPreview.innerHTML = '';
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('addLocBtn').addEventListener('click', ()=>{
    const input = document.getElementById('newLocInput');
    const val = input.value.trim();
    if(!val) return;
    if(!locations.includes(val)) locations.push(val);
    renderLocationSelect();
    locationSelect.value = val;
    input.value = "";
    renderChips();
  });

  document.getElementById('saveBtn').addEventListener('click', ()=>{
    const name = nameInput.value.trim();
    if(!name){ nameInput.focus(); return; }
    const location = locationSelect.value || locations[0] || "Sans emplacement";

    if(editingId){
      const it = items.find(i=>i.id===editingId);
      it.name = name;
      it.qty = pendingQty;
      it.location = location;
      it.photo = pendingPhoto;
    } else {
      items.push({id:nextId(), name, qty:pendingQty, location, photo:pendingPhoto});
    }
    closeSheet();
    renderChips();
    renderList();
  });

  deleteBtn.addEventListener('click', ()=>{
    if(!editingId) return;
    items = items.filter(i=>i.id !== editingId);
    closeSheet();
    renderChips();
    renderList();
  });

  document.getElementById('searchInput').addEventListener('input', (e)=>{
    searchTerm = e.target.value;
    renderList();
  });

  renderChips();
  renderList();
</script>

</body>
</html>
