<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Stock — Inventaire</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E3B2A">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stock">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
<link rel="icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <h1>Stock</h1>
    <p class="auth-subtitle">Inventaire partagé</p>

    <div class="field">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="toi@exemple.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="auth-error" id="authError" style="display:none;"></div>

    <div class="sheet-actions">
      <button class="btn-outline" id="authSignUpBtn">Créer un compte</button>
      <button class="btn-primary" id="authSignInBtn">Se connecter</button>
    </div>
  </div>
</div>

<div id="appRoot" style="display:none;">

<header>
  <div class="top-row">
    <h1>Stock</h1>
    <div class="header-actions">
      <span class="count mono" id="itemCount">0 article</span>
      <button class="io-btn mono" id="exportExcelBtn">Excel</button>
      <button class="io-btn mono" id="importExcelBtn">Importer</button>
      <button class="io-btn mono" id="signOutBtn">Déconnexion</button>
      <input type="file" id="importExcelInput" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" style="display:none;">
    </div>
  </div>
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Rechercher un article…">
  </div>
  <div class="chips" id="locationChips"></div>
  <div class="chips chips-category" id="categoryChips"></div>
</header>

<main>
  <div class="selection-bar" id="selectionBar">
    <button class="sel-btn mono" id="selectAllBtn">Tout sélectionner</button>
    <span class="selection-count mono" id="selectionCount"></span>
    <button class="sel-btn danger mono" id="bulkDeleteBtn" style="display:none;">Supprimer</button>
  </div>
  <div id="emptyState" class="empty" style="display:none;">
    <i>&#9678;</i>
    Aucun article pour l'instant.<br>Ajoutez le premier avec le bouton ci-dessous.
  </div>
  <div id="list"></div>
</main>

<div class="fab-bar">
  <button class="fab" id="addBtn">+ Ajouter un article</button>
</div>

<div class="sheet-overlay" id="sheetOverlay">
  <div class="sheet">
    <div class="sheet-header">
      <button class="back-btn" id="sheetBackBtn" aria-label="Retour">&#8592;</button>
      <h2 id="sheetTitle">Nouvel article</h2>
    </div>

    <div class="field">
      <label>Photos (5 max)</label>
      <div class="photo-grid" id="photoGrid"></div>
      <input type="file" accept="image/*" capture="environment" id="photoInput" style="display:none;">
    </div>

    <div class="field">
      <label>Nom du produit</label>
      <input type="text" id="nameInput" placeholder="Ex. Vis à bois 4x40">
    </div>

    <div class="field">
      <label class="checkbox-field">
        <input type="checkbox" id="storedCheckbox">
        <span>Rangé</span>
      </label>
    </div>

    <div class="field">
      <label>Quantité</label>
      <div class="qty-field">
        <div class="stepper">
          <button id="qtyMinus">–</button>
          <input type="number" inputmode="numeric" class="qty-input mono" id="qtyDisplay" value="1" min="0">
          <button id="qtyPlus">+</button>
        </div>
        <select id="unitSelect" class="unit-select"></select>
      </div>
      <div class="add-row">
        <input type="text" id="newUnitInput" placeholder="Nouvelle unité…">
        <button id="addUnitBtn">Ajouter</button>
      </div>
    </div>

    <div class="field">
      <label>Emplacement</label>
      <select id="locationSelect"></select>
    </div>

    <div class="field">
      <label>Catégorie</label>
      <select id="categorySelect">
        <option value="">Sélectionner…</option>
      </select>
    </div>

    <div class="field">
      <label>Dimensions</label>
      <input type="text" id="dimensionsInput" placeholder="Ex. 30 x 20 x 15 cm">
    </div>

    <div class="field">
      <label>État général</label>
      <select id="conditionSelect">
        <option value="">—</option>
        <option value="Bon état">Bon état</option>
        <option value="Usagé">Usagé</option>
        <option value="À réparer">À réparer</option>
      </select>
    </div>

    <div class="field">
      <label>Remarques</label>
      <textarea id="notesInput" rows="3" placeholder="Ex. à réparer, prêté à quelqu'un, acheté en 2022…"></textarea>
    </div>

    <div class="sheet-actions">
      <button class="btn-secondary" id="deleteBtn" style="display:none;">Supprimer</button>
      <button class="btn-primary" id="saveBtn">Enregistrer</button>
    </div>
  </div>
</div>

<div class="photo-viewer-overlay" id="photoViewerOverlay">
  <button class="viewer-nav viewer-prev" id="viewerPrevBtn" aria-label="Photo précédente">&#8249;</button>
  <img id="photoViewerImg" alt="Photo de l'article">
  <button class="viewer-nav viewer-next" id="viewerNextBtn" aria-label="Photo suivante">&#8250;</button>
  <div class="viewer-counter" id="viewerCounter"></div>
</div>

</div>

<script src="vendor/exceljs.min.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
